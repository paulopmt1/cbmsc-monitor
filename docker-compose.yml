version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cbmsc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cbmsc
      POSTGRES_PASSWORD: cbmsc_dev_password
      POSTGRES_DB: cbmsc_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbmsc -d cbmsc_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cbmsc-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cbmsc.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
