services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cbmsc
      POSTGRES_PASSWORD: cbmsc
      POSTGRES_DB: cbmsc_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbmsc -d cbmsc_monitor"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://cbmsc:cbmsc@db:5432/cbmsc_monitor
      DB_DRIVER: postgres
      PORT: 3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
