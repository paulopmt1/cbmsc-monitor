<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBM SC Monitor - Ocorrências</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .header p {
            color: #7f8c8d;
            text-align: center;
            font-size: 1.1rem;
        }

        .header-actions {
            position: absolute;
            top: 16px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gh-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            color: #666;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .gh-link:hover {
            color: #764ba2;
        }

        .lang-selector {
            display: flex;
            background: #e1e5eb;
            border-radius: 6px;
            overflow: hidden;
        }

        .lang-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            color: #666;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 5px;
        }

        .lang-btn:hover:not(.active) {
            background: #d0d4db;
        }

        .filters {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .filters h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .filter-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        .filter-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .stats {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .occurrences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .occurrence-card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border-left: 5px solid #667eea;
        }

        .occurrence-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .occurrence-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .emergency-icon {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.5rem;
            color: white;
        }

        .emergency-info h3 {
            color: #2c3e50;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .emergency-info .city {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .occurrence-details {
            margin-bottom: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            color: #7f8c8d;
            font-weight: 600;
        }

        .detail-value {
            color: #2c3e50;
            font-weight: 500;
        }

        .coordinates {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .coordinates:hover {
            background: #e9ecef;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .coordinates h4 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .coordinate-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .description {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .description h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 600;
        }

        .description p {
            color: #495057;
            line-height: 1.5;
            font-size: 0.9rem;
            margin: 0;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #7f8c8d;
            font-size: 1.2rem;
        }

        .error {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin: 20px 0;
        }

        .no-data {
            background: white;
            border-radius: 8px;
            padding: 50px;
            text-align: center;
            color: #7f8c8d;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .pagination button:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
        }

        .pagination .page-info {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .load-more-sentinel {
            height: 1px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .filter-row {
                flex-direction: column;
            }
            
            .occurrences-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
        }

        .chat-toggle.active {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        .chat-panel {
            position: absolute;
            bottom: 72px;
            right: 0;
            width: 400px;
            height: 560px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .chat-panel.hidden {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .chat-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-close:hover {
            background: rgba(255,255,255,0.35);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            max-width: 88%;
            animation: chatFadeIn 0.2s ease;
        }

        @keyframes chatFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-message.user {
            align-self: flex-end;
        }

        .chat-message.assistant {
            align-self: flex-start;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.88rem;
            line-height: 1.55;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .chat-message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.assistant .message-content {
            background: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .chat-message.assistant .message-content p {
            margin: 0 0 8px;
        }

        .chat-message.assistant .message-content p:last-child {
            margin-bottom: 0;
        }

        .chat-message.assistant .message-content ul,
        .chat-message.assistant .message-content ol {
            margin: 4px 0;
            padding-left: 20px;
        }

        .chat-message.assistant .message-content li {
            margin-bottom: 2px;
        }

        .chat-message.assistant .message-content strong {
            font-weight: 700;
        }

        .chat-message.assistant .message-content code {
            background: #e2e6ea;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.84rem;
        }

        .chat-message.assistant .message-content table {
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 0.82rem;
            width: 100%;
        }

        .chat-message.assistant .message-content th,
        .chat-message.assistant .message-content td {
            border: 1px solid #ddd;
            padding: 4px 8px;
            text-align: left;
        }

        .chat-message.assistant .message-content th {
            background: #e8eaf0;
            font-weight: 600;
        }

        .chat-message.error .message-content {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .typing-indicator .message-content {
            display: flex;
            gap: 5px;
            padding: 14px 20px;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .chat-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .chat-suggestion {
            background: rgba(102, 126, 234, 0.08);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.25);
            padding: 5px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .chat-suggestion:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #eaeaea;
            display: flex;
            gap: 8px;
            background: white;
            flex-shrink: 0;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .chat-input-area input:focus {
            border-color: #667eea;
        }

        .chat-input-area input:disabled {
            background: #f9f9f9;
            color: #999;
        }

        .chat-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
            font-size: 0.95rem;
        }

        .chat-send:hover {
            transform: scale(1.08);
        }

        .chat-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .chat-header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-settings-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-settings-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        .chat-settings-btn.active {
            background: rgba(255,255,255,0.4);
        }

        .chat-settings-panel {
            background: #f8f9fb;
            border-bottom: 1px solid #e1e5eb;
            padding: 14px 16px;
            display: none;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-settings-panel.open {
            display: flex;
        }

        .provider-toggle {
            display: flex;
            background: #e1e5eb;
            border-radius: 8px;
            overflow: hidden;
        }

        .provider-toggle button {
            flex: 1;
            padding: 7px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            color: #666;
            transition: all 0.2s;
        }

        .provider-toggle button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 6px;
        }

        .chat-settings-panel label {
            font-size: 0.75rem;
            color: #555;
            font-weight: 600;
        }

        .chat-settings-panel input[type="text"] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 0.78rem;
            font-family: monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-settings-panel input[type="text"]:focus {
            border-color: #667eea;
        }

        .chat-settings-panel input[type="text"]:disabled {
            background: #eee;
            color: #999;
        }

        .provider-badge {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 600;
            margin-left: 6px;
            vertical-align: middle;
        }

        .provider-badge.anthropic {
            background: rgba(255,255,255,0.25);
            color: white;
        }

        .provider-badge.local {
            background: #34d399;
            color: #065f46;
        }

        @media (max-width: 480px) {
            .chat-panel {
                width: calc(100vw - 48px);
                height: calc(100vh - 100px);
                bottom: 72px;
                right: -12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-actions">
                <a class="gh-link" href="https://github.com/paulopmt1/cbmsc-monitor" target="_blank" rel="noopener noreferrer" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
                <div class="lang-selector">
                    <button class="lang-btn active" id="langPt" onclick="setLang('pt')">PT</button>
                    <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
                </div>
            </div>
            <h1>🚨 CBM SC Monitor</h1>
            <p data-i18n="headerSubtitle">Monitoramento de Ocorrências do Corpo de Bombeiros de Santa Catarina</p>
        </div>

        <div class="filters">
            <h2 data-i18n="filtersTitle">🔍 Filtros</h2>
            <div class="filter-row">
                <div class="filter-group">
                    <label for="cityFilter" data-i18n="cityLabel">Cidade:</label>
                    <select id="cityFilter">
                        <option value="" data-i18n="cityAll">Todas as cidades</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="emergencyFilter" data-i18n="emergencyLabel">Tipo de Emergência:</label>
                    <select id="emergencyFilter">
                        <option value="" data-i18n="emergencyAll">Todos os tipos</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="stats">
            <h2 data-i18n="statsTitle">📊 Estatísticas</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalOccurrences">0</div>
                    <div class="stat-label" data-i18n="statTotal">Total de Ocorrências</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="filteredOccurrences">0</div>
                    <div class="stat-label" data-i18n="statFiltered">Ocorrências Filtradas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalCities">0</div>
                    <div class="stat-label" data-i18n="statCities">Cidades</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalEmergencyTypes">0</div>
                    <div class="stat-label" data-i18n="statTypes">Tipos de Emergência</div>
                </div>
            </div>
        </div>

        <div id="content">
            <div class="loading" data-i18n="loading">Carregando ocorrências...</div>
        </div>
    </div>

    <script>
        // ─── i18n ────────────────────────────────────────────────────
        const LANG_KEY = 'cbmsc-lang';
        let currentLang = localStorage.getItem(LANG_KEY) || 'pt';

        const translations = {
            pt: {
                pageTitle: 'CBM SC Monitor - Ocorrências',
                headerSubtitle: 'Monitoramento de Ocorrências do Corpo de Bombeiros de Santa Catarina',
                filtersTitle: '🔍 Filtros',
                cityLabel: 'Cidade:',
                cityAll: 'Todas as cidades',
                emergencyLabel: 'Tipo de Emergência:',
                emergencyAll: 'Todos os tipos',
                statsTitle: '📊 Estatísticas',
                statTotal: 'Total de Ocorrências',
                statFiltered: 'Ocorrências Filtradas',
                statCities: 'Cidades',
                statTypes: 'Tipos de Emergência',
                loading: 'Carregando ocorrências...',
                errorLoadingData: 'Erro ao carregar dados: ',
                failedToLoad: 'Falha ao carregar ocorrências',
                noData: 'Nenhuma ocorrência encontrada',
                noDataHint: 'Tente ajustar os filtros para ver mais resultados.',
                errorTitle: 'Erro',
                cardOccurrenceDate: 'Data da Ocorrência:',
                cardRegisteredAt: 'Registrado em:',
                cardGpsCoordinates: '📍 Coordenadas GPS (Clique para abrir no Google Maps)',
                chatTitle: 'Assistente CBM SC',
                chatSettings: 'Configurações',
                chatLocalModel: 'Modelo Local',
                chatLocalUrl: 'URL do modelo local',
                chatModelName: 'Nome do modelo (opcional)',
                chatModelPlaceholder: 'Deixe vazio para usar o padrão',
                chatProxyNote: 'Requer o proxy local: <code style="background:#e8e8e8;padding:1px 4px;border-radius:3px;font-size:0.68rem;">node local-proxy.js</code><br>(encaminha para LM Studio com headers CORS)',
                chatGreeting: '<p>Olá! Sou o assistente do <strong>CBM SC Monitor</strong>. Posso analisar dados de ocorrências de emergência em Santa Catarina.</p><p>Experimente perguntar:</p>',
                chatPlaceholder: 'Pergunte sobre ocorrências...',
                chatSuggestions: [
                    { text: 'Ocorrências este mês', query: 'Quantas ocorrências houve este mês?' },

                const [, , occData] = await Promise.all([

        async function fetchPage(offset) {
            const params = new URLSearchParams({ limit: PAGE_SIZE, offset });

            const typeVal = document.getElementById('emergencyFilter')?.value;

            const res = await fetch(`${API_BASE}/occurrences?${params}`);
            const json = await res.json();
            if (json.message !== 'ok') throw new Error(t('failedToLoad'));
            return json;

        function setupInfiniteScroll() {
            if (observer) observer.disconnect();

            const sentinel = document.getElementById('sentinel');
            if (!sentinel) return;

            observer = new IntersectionObserver(async (entries) => {
                if (!entries[0].isIntersecting || isLoading) return;
                if (currentOffset >= totalServerCount) {
                    observer.disconnect();
                    return;
                }
                await loadNextPage();
            }, { rootMargin: '400px' });

            observer.observe(sentinel);
        }

        async function loadNextPage() {
            if (isLoading || currentOffset >= totalServerCount) return;
            isLoading = true;

            try {
                const data = await fetchPage(currentOffset);
                if (data.data.length === 0) {
                    isLoading = false;
                    return;
                }

                loadedOccurrences = loadedOccurrences.concat(data.data);
                currentOffset += data.data.length;
                appendCards(data.data);
                updateStats();
            } catch (err) {
                console.error('Error loading next page:', err);
            } finally {
                isLoading = false;
            }
        }

        // ─── Local LLM calling ──────────────────────────────────────
        async function callLocalLLM(messages) {
            const url = chatConfig.localUrl.replace(/\/+$/, '') + '/chat/completions';
            const body = {
                messages: [
                    { role: 'system', content: buildLocalSystemPrompt() },
                    ...messages
                ],
                tools: localToolDefs,
                tool_choice: 'auto',
                max_tokens: 2048,
            };
            if (chatConfig.localModel) {
                body.model = chatConfig.localModel;
            }

            let resp;
            try {
                resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            } catch (networkErr) {
                throw new Error(t('chatErrorLocalConnect'));
            }

            if (!resp.ok) {
                const text = await resp.text();
                throw new Error(`Local LLM ${resp.status}: ${text}`);
            }
            return resp.json();
        }

        async function executeToolCalls(toolCalls) {
            const calls = toolCalls.map(tc => ({
                name: tc.function.name,
                args: JSON.parse(tc.function.arguments || '{}'),
            }));

            const res = await fetch(API_BASE + '/api/chat-tools', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ calls }),
            });

            if (!res.ok) {
                throw new Error(t('chatErrorTools'));
            }

            const data = await res.json();
            return data.results;
        }

        async function sendChatLocal(userText) {
            const openaiMessages = chatMessages.slice(-20).map(m => ({
                role: m.role,
                content: m.content,
            }));

            let textResult = '';

            for (let step = 0; step < 5; step++) {
                const response = await callLocalLLM(openaiMessages);
                const choice = response.choices && response.choices[0];
                if (!choice) break;

                const msg = choice.message;
                const content = msg.content || '';
                const toolCalls = msg.tool_calls || [];

                if (content) {
                    textResult += content;
                }

                if (choice.finish_reason !== 'tool_calls' && toolCalls.length === 0) {
                    break;
                }

                openaiMessages.push(msg);

                const results = await executeToolCalls(toolCalls);

                for (let i = 0; i < toolCalls.length; i++) {
                    const tc = toolCalls[i];
                    const r = results[i];
                    openaiMessages.push({
                        role: 'tool',
                        tool_call_id: tc.id,
                        content: JSON.stringify(r.result != null ? r.result : { error: r.error }),
                    });
                }
            }

            return textResult;
        }

        // ─── Send (dispatches to Anthropic or Local) ─────────────────
        async function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || chatWaiting) return;

            chatMessages.push({ role: 'user', content: text });
            appendChat('user', text);
            input.value = '';
            chatWaiting = true;
            input.disabled = true;
            document.getElementById('chatSend').disabled = true;

            const suggestions = document.getElementById('chatSuggestions');
            if (suggestions) suggestions.remove();

            showTyping();

            try {
                if (chatConfig.provider === 'local') {
                    const fullText = await sendChatLocal(text);
                    hideTyping();
                    const msgEl = appendChat('assistant', '');
                    msgEl.querySelector('.message-content').innerHTML = marked.parse(fullText);
                    scrollChat();
                    chatMessages.push({ role: 'assistant', content: fullText });
                } else {
                    const res = await fetch(API_BASE + '/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: chatMessages, lang: currentLang }),
                    });

                    hideTyping();

                    if (!res.ok) {
                        let errMsg = t('chatErrorConnect');
                        try {
                            const err = await res.json();
                            errMsg = err.error || errMsg;
                        } catch (_) {}
                        const errEl = appendChat('assistant', '');
                        errEl.className = 'chat-message error';
                        errEl.querySelector('.message-content').textContent = errMsg;
                        return;
                    }

                    const msgEl = appendChat('assistant', '');
                    const contentEl = msgEl.querySelector('.message-content');
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        fullText += decoder.decode(value, { stream: true });
                        contentEl.innerHTML = marked.parse(fullText);
                        scrollChat();
                    }

                    chatMessages.push({ role: 'assistant', content: fullText });
                }
            } catch (err) {
                hideTyping();
                const errEl = appendChat('assistant', '');
                errEl.className = 'chat-message error';
                errEl.querySelector('.message-content').textContent = t('chatErrorConnection') + err.message;
            } finally {
                chatWaiting = false;
                input.disabled = false;
                document.getElementById('chatSend').disabled = false;
                input.focus();
            }
        }

        // ─── Init chat listeners ─────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('chatToggle').addEventListener('click', toggleChat);
            document.getElementById('chatClose').addEventListener('click', toggleChat);
            document.getElementById('chatSend').addEventListener('click', sendChat);
            document.getElementById('chatInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChat();
                }
            });

            document.getElementById('chatSettingsBtn').addEventListener('click', toggleSettings);

            const urlInput = document.getElementById('localUrlInput');
            const modelInput = document.getElementById('localModelInput');
            urlInput.value = chatConfig.localUrl;
            modelInput.value = chatConfig.localModel;
            urlInput.addEventListener('change', function() {
                chatConfig.localUrl = this.value.trim() || defaultConfig.localUrl;
                saveChatConfig(chatConfig);
            });
            modelInput.addEventListener('change', function() {
                chatConfig.localModel = this.value.trim();
                saveChatConfig(chatConfig);
            });

            updateProviderUI();
            applyLanguage();
        });
    </script>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <div id="chatPanel" class="chat-panel hidden">
            <div class="chat-header">
                <h3><i class="fas fa-robot"></i>&nbsp; <span data-i18n="chatTitle">Assistente CBM SC</span><span id="providerBadge" class="provider-badge anthropic">Anthropic</span></h3>
                <div class="chat-header-actions">
                    <button id="chatSettingsBtn" class="chat-settings-btn" data-i18n-title="chatSettings" title="Configurações"><i class="fas fa-cog"></i></button>
                    <button id="chatClose" class="chat-close">&times;</button>
                </div>
            </div>
            <div id="chatSettingsPanel" class="chat-settings-panel">
                <div class="provider-toggle">
                    <button id="provAnthropicBtn" class="active" onclick="setProvider('anthropic')">Anthropic</button>
                    <button id="provLocalBtn" onclick="setProvider('local')" data-i18n="chatLocalModel">Modelo Local</button>
                </div>
                <div id="localSettings" style="display:none;flex-direction:column;gap:8px;">
                    <div>
                        <label data-i18n="chatLocalUrl">URL do modelo local</label>
                        <input type="text" id="localUrlInput" placeholder="http://localhost:5001/v1" />
                    </div>
                    <div>
                        <label data-i18n="chatModelName">Nome do modelo (opcional)</label>
                        <input type="text" id="localModelInput" data-i18n-placeholder="chatModelPlaceholder" placeholder="Deixe vazio para usar o padrão" />
                    </div>
                    <div id="chatProxyNote" style="font-size:0.7rem;color:#888;line-height:1.4;margin-top:2px;">
                    </div>
                </div>
            </div>
            <div id="chatMessages" class="chat-messages">
                <div class="chat-message assistant" id="chatGreetingMsg">
                    <div class="message-content" id="chatGreetingContent">
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <input id="chatInput" type="text" data-i18n-placeholder="chatPlaceholder" placeholder="Pergunte sobre ocorrências..." autocomplete="off" />
                <button id="chatSend" class="chat-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button id="chatToggle" class="chat-toggle">
            <i class="fas fa-comment-dots"></i>
        </button>
    </div>
</body>
</html>
